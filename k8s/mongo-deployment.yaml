apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o ../k8s/
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: mongo
  name: mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: mongo
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o ../k8s/
        kompose.version: 1.38.0 (HEAD)
      labels:
        io.kompose.service: mongo
    spec:
      containers:
        - args:
            - --auth
          envFrom:
            - configMapRef:
                name: env-production
          image: mongo:latest
          livenessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - db.runCommand("ping").ok
                - --quiet
            failureThreshold: 3
            initialDelaySeconds: 15
            periodSeconds: 15
          name: semki-mongo
          ports:
            - containerPort: 27017
              protocol: TCP
          volumeMounts:
            - mountPath: /data/db
              name: mongodb-data
            - mountPath: /docker-entrypoint-initdb.d/mongo-init.js
              name: mongo-cm1
              subPath: mongo-init.js
      restartPolicy: Always
      volumes:
        - name: mongodb-data
          persistentVolumeClaim:
            claimName: mongodb-data
        - configMap:
            items:
              - key: mongo-init.js
                path: mongo-init.js
            name: mongo-cm1
          name: mongo-cm1
