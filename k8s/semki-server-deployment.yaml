apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o ../k8s/
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: semki-server
  name: semki-server
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: semki-server
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o ../k8s/
        kompose.version: 1.38.0 (HEAD)
      labels:
        io.kompose.service: semki-server
    spec:
      containers:
        - envFrom:
            - configMapRef:
                name: env-production
          image: semki-server
          imagePullPolicy: Never
          livenessProbe:
            exec:
              command:
                - wget
                - -q
                - --spider
                - http://localhost:8000/api/v1/healthcheck
            failureThreshold: 3
            initialDelaySeconds: 1
            periodSeconds: 15
            timeoutSeconds: 3
          name: semki-server
          ports:
            - containerPort: 8000
              protocol: TCP
      restartPolicy: Always
