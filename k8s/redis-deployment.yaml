apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o ../k8s/
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: redis
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: redis
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o ../k8s/
        kompose.version: 1.38.0 (HEAD)
      labels:
        io.kompose.service: redis
    spec:
      containers:
        - args:
            - redis-server
            - --requirepass
            - CzD4W1190L1G
          envFrom:
            - configMapRef:
                name: env-production
          image: redis:7
          livenessProbe:
            exec:
              command:
                - redis-cli
                - -a
                - CzD4W1190L1G
                - ping
            failureThreshold: 5
            periodSeconds: 10
            timeoutSeconds: 2
          name: semki-redis
          ports:
            - containerPort: 6379
              protocol: TCP
      restartPolicy: Always
