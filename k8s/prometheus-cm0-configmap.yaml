apiVersion: v1
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: 'semki_dev'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['localhost:8080']

      - job_name: 'semki_prod'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['semki-server:8080']

      - job_name: mongodb
        scrape_interval: 5s
        static_configs:
          - targets: ['mongodb-exporter:9216']
kind: ConfigMap
metadata:
  annotations:
    use-subpath: "true"
  labels:
    io.kompose.service: prometheus
  name: prometheus-cm0
