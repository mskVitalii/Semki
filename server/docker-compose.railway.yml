services:
  # ----------------------------------- APPS
  semki-server:
    build: .
    container_name: semki-server
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/api/v1/healthcheck"]
      interval: 15s
      timeout: 3s
      start_period: 1s
      retries: 3
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
      mailhog:
        condition: service_started
      embedder:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  embedder:
    image: mskkote/open-data-embedder:latest
    container_name: semki-embedder
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 5s

  web:
    container_name: semki-web
    build:
      context: ../client
      dockerfile: ../client/Dockerfile
      args:
        # Set VITE_API_URL to the public Railway URL of semki-server,
        # e.g. https://<project>.up.railway.app
        VITE_API_URL: "${VITE_API_URL}"
    ports:
      - "80:80"
    restart: unless-stopped


  # ----------------------------------- DATABASES
  mongo:
    build:
      context: ./resources
      dockerfile: Dockerfile.mongo
    container_name: semki-mongo
    healthcheck:
      test: mongosh --eval 'db.runCommand("ping").ok' --quiet
      interval: 15s
      retries: 3
      start_period: 15s
    ports:
      - 27017:27017
    volumes:
      - mongodb-data:/data/db
    command: ["--auth"]

  qdrant:
    image: qdrant/qdrant:v1.14.1
    container_name: semki-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__ENABLE_TLS=false
      - QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS=0
      - QDRANT__STORAGE__PERFORMANCE__MAX_OPTIMIZATION_THREADS=2
      - QDRANT__STORAGE__OPTIMIZERS__PAYLOAD_INDEX_THRESHOLD=20000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "timeout", "1", "bash", "-c", "</dev/tcp/localhost/6333"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  redis:
    image: redis:7
    container_name: semki-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 2s
      retries: 5
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]


  # ----------------------------------- INFRA
  # [MONITORING] Prometheus — config baked into image
  prometheus:
    build:
      context: ./resources
      dockerfile: Dockerfile.prometheus
    ports:
      - "9090:9090"
    container_name: semki-prometheus

  # [MONITORING] Grafana — provisioning baked into image
  grafana:
    build:
      context: ./resources
      dockerfile: Dockerfile.grafana
    ports:
      - "3030:3000"
    container_name: semki-grafana
    environment:
      - GF_FEATURE_TOGGLES_ENABLE=flameGraph
    volumes:
      - grafana:/var/lib/grafana

  # [PROFILING] Pyroscope
  pyroscope:
    image: pyroscope/pyroscope:latest
    deploy:
      restart_policy:
        condition: on-failure
    ports:
      - "4040:4040"
    container_name: semki-pyroscope
    environment:
      - PYROSCOPE_STORAGE_PATH=/var/lib/pyroscope
    command: ["server"]

  # [TRACING] Jaeger
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "14269:14269"
      - "${JAEGER_PORT:-14268}:14268"
    container_name: semki-jaeger

  # [LOGGING] Promtail — config baked into image
  promtail:
    build:
      context: ./resources
      dockerfile: Dockerfile.promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
    container_name: semki-promtail

  # [LOGGING] Loki — config baked into image
  loki:
    build:
      context: ./resources
      dockerfile: Dockerfile.loki
    ports:
      - "3100:3100"
    container_name: semki-loki
    volumes:
      - loki-data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # [MAIL] Mailhog
  mailhog:
    image: mailhog/mailhog
    container_name: semki-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

  # [MONITORING] MongoDB Exporter
  mongodb_exporter:
    image: percona/mongodb_exporter:0.30
    container_name: semki-mongodb-exporter
    restart: unless-stopped
    ports:
      - "9216:9216"
    environment:
      MONGODB_USER: ${MONGO_METRICS_USERNAME}
      MONGODB_PASSWORD: ${MONGO_METRICS_USER_PASSWORD}
    command:
      - "--mongodb.uri=mongodb://${MONGO_METRICS_USERNAME}:${MONGO_METRICS_USER_PASSWORD}@mongo:${MONGO_PORT}/?authSource=admin"
      - "--collector.dbstats"
      - "--collector.topmetrics"
      - "--compatible-mode"
    depends_on:
      mongo:
        condition: service_healthy


# ----------------------------------- OTHER
volumes:
  mongodb-data:
  qdrant-data:
  grafana:
  loki-data:
